<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Regista - Advanced 2D Match Engine</title>
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-panel: #1f2833;
            --text-main: #c5a059;
            --text-light: #f5f5f5;
            --accent: #45f3ff;
            --pitch-line: rgba(255, 255, 255, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-light); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 15px; }
        header { text-align: center; margin-bottom: 5px; border-bottom: 2px solid var(--text-main); padding-bottom: 10px; }
        header h1 { color: var(--text-main); font-size: 1.8rem; letter-spacing: 2px; }
        header p { font-size: 0.85rem; color: #888; }

        .panel { background: var(--bg-panel); padding: 20px; border-radius: 12px; border: 1px solid #2f3e46; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h3 { color: var(--text-main); margin-bottom: 15px; font-size: 1.1rem; border-left: 4px solid var(--text-main); padding-left: 8px; }

        .global-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #151a21; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #2a3439; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .setup-grid { grid-template-columns: 1fr; } .global-settings { grid-template-columns: 1fr; } }

        label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 4px; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
        select { width: 100%; padding: 10px; background: #0f141c; border: 1px solid #3a4750; color: #fff; border-radius: 6px; font-size: 0.9rem; transition: 0.3s; }
        select:focus { border-color: var(--text-main); outline: none; }

        .btn { display: block; width: 100%; padding: 14px; background: var(--text-main); border: none; color: #000; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { background: #e0b35c; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        /* Skor ve Canlı İstatistik */
        .scoreboard { display: flex; justify-content: space-between; align-items: center; background: #0f141c; padding: 15px 25px; border-radius: 8px; border: 1px solid #2a3439; font-weight: bold; font-size: 1.3rem; margin-bottom: 10px; }
        .score-team { display: flex; align-items: center; gap: 10px; }
        .time { color: var(--accent); font-family: 'Courier New', Courier, monospace; font-size: 1.5rem; background: #000; padding: 4px 10px; border-radius: 4px; border: 1px solid #222; }

        /* Saha Yapısı */
        .pitch-container { width: 100%; background: #050505; border-radius: 10px; overflow: hidden; display: flex; justify-content: center; border: 2px solid #2f3e46; position: relative; }
        canvas { background: #143d1f; display: block; max-width: 100%; height: auto; }

        .live-report { background: #0f141c; padding: 10px; border-radius: 6px; font-size: 0.85rem; height: 40px; overflow: hidden; text-align: center; color: #aaa; border: 1px solid #2a3439; margin-top: 10px; line-height: 20px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>THE REGISTA</h1>
        <p>Sofifa Pro & Tactical 2D Match Engine</p>
    </header>
    
    <div id="setupPanel" class="panel">
        <div class="global-settings">
            <div>
                <label>Maç Süresi (Gerçek Zamanlı)</label>
                <select id="matchDuration">
                    <option value="2">2 Dakika (Aşırı Hızlı)</option>
                    <option value="5" selected>5 Dakika (Dengeli Simülasyon)</option>
                    <option value="10">10 Dakika (Taktiksel Analiz)</option>
                </select>
            </div>
            <div>
                <label>Maç Kondisyonu / Hava Durumu</label>
                <select id="weather">
                    <option value="normal">Güneşli (Zemin İdeal)</option>
                    <option value="rainy">Yağmurlu (Top Hızlanır, Pas Hatası Artar)</option>
                </select>
            </div>
        </div>

        <div class="setup-grid">
            <div style="background: rgba(52, 152, 219, 0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(52, 152, 219, 0.2);">
                <h4 style="color: #3498db; font-size: 1.1rem; margin-bottom: 10px;">🛡️ Ev Sahibi Takım</h4>
                
                <label>Kadro Seçimi</label>
                <select id="hSquad">
                    <option value="fenerbahce">Fenerbahçe Efsaneleri / Güncel</option>
                    <option value="worldclass">Sofifa World XI (Hücum Ağırlıklı)</option>
                </select>

                <label>Diziliş</label>
                <select id="hForm">
                    <option value="4231">4-2-3-1 (Modern Geniş)</option>
                    <option value="433">4-3-3 (Tiki-Taka İdeal)</option>
                    <option value="442">4-4-2 (Klasik / Pres)</option>
                    <option value="352">3-5-2 (Orta Saha Blokajı)</option>
                    <option value="532">5-3-2 (Katı Savunma)</option>
                </select>

                <label>Oyun Tarzı</label>
                <select id="hTactic">
                    <option value="gegen">Gegenpress (Yüksek Şok Pres)</option>
                    <option value="tiki" selected>Tiki-Taka (Kısa ve Sabırlı Pas)</option>
                    <option value="counter">Kontra Atak (Hızlı Çıkış)</option>
                    <option value="wing">Kanat Organizasyonları</option>
                    <option value="bus">Otobüsü Çek (Catenaccio)</option>
                </select>

                <label>Savunma Çizgisi</label>
                <select id="hLine">
                    <option value="high">Önde (Üçüncü Bölge Baskısı)</option>
                    <option value="mid" selected>Standart (İkinci Bölge)</option>
                    <option value="low">Gömülü (Ceza Sahası Önü)</option>
                </select>
            </div>
            
            <div style="background: rgba(231, 76, 60, 0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(231, 76, 60, 0.2);">
                <h4 style="color: #e74c3c; font-size: 1.1rem; margin-bottom: 10px;">🚀 Deplasman Takımı</h4>
                
                <label>Kadro Seçimi</label>
                <select id="aSquad">
                    <option value="allstar">Sofifa All-Stars (Galacticos)</option>
                    <option value="fenerbahce">Fenerbahçe Karma</option>
                </select>

                <label>Diziliş</label>
                <select id="aForm">
                    <option value="433" selected>4-3-3 (Ofansif Akış)</option>
                    <option value="4231">4-2-3-1 (Dengeli Kurulum)</option>
                    <option value="442">4-4-2 (Kanat Baskısı)</option>
                    <option value="352">3-5-2 (Dinamik Geçiş)</option>
                    <option value="541">5-4-1 (Tam Kilit)</option>
                </select>

                <label>Oyun Tarzı</label>
                <select id="aTactic">
                    <option value="gegen">Gegenpress (Yoğun Baskı)</option>
                    <option value="tiki">Tiki-Taka (Kısa Pas)</option>
                    <option value="counter" selected>Kontra Atak (Ölümcül Geçiş)</option>
                    <option value="wing">Kanat Hücumu</option>
                    <option value="bus">Otobüsü Çek (Defans Bloğu)</option>
                </select>

                <label>Savunma Çizgisi</label>
                <select id="aLine">
                    <option value="high">Önde Basan</option>
                    <option value="mid">Merkezde Kalan</option>
                    <option value="low" selected>Derin Savunma</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="startEngine()">Stratejiyi Uygula ve Maçı Başlat</button>
    </div>

    <div id="matchPanel" class="panel hidden">
        <div class="scoreboard">
            <div class="score-team"><span style="width:12px; height:12px; background:#3498db; border-radius:50%;"></span> EV SAHİBİ</div>
            <div id="scoreDisplay" style="letter-spacing: 3px; font-size: 1.6rem; color: #fff;">0 - 0</div>
            <div class="score-team">DEPLASMAN <span style="width:12px; height:12px; background:#e74c3c; border-radius:50%;"></span></div>
            <div class="time" id="timeDisplay">00:00</div>
        </div>
        
        <div class="pitch-container">
            <canvas id="pitch" width="750" height="480"></canvas>
        </div>

        <div id="liveReport" class="live-report">Maç başlıyor, takımlar sahaya çıkıyor...</div>
        
        <button class="btn" style="background: #e74c3c; color: #fff;" onclick="abortMatch()">Maçı Durdur ve Ayarlara Dön</button>
    </div>
</div>

<script>
const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');

// SOFIFA AYARLARINA UYGUN REYTING VERİTABANI
const sofifaDatabase = {
    fenerbahce: [
        { name: "D. Livakovic", role: "GK", ovr: 82, pac: 45, sho: 15, pas: 68, def: 82, phy: 78 },
        { name: "B. Osayi-Samuel", role: "RB", ovr: 78, pac: 93, sho: 60, pas: 68, def: 74, phy: 80 },
        { name: "A. Djiku", role: "CB", ovr: 80, pac: 76, sho: 48, pas: 66, def: 81, phy: 83 },
        { name: "R. Rodrigo Becao", role: "CB", ovr: 79, pac: 68, sho: 35, pas: 55, def: 80, phy: 85 },
        { name: "Ferdi Kadıoğlu", role: "LB", ovr: 82, pac: 84, sho: 72, pas: 80, def: 76, phy: 79 },
        { name: "Sofyan Amrabat", role: "CDM", ovr: 80, pac: 68, sho: 65, pas: 75, def: 79, phy: 86 },
        { name: "Fred Rodrigues", role: "CM", ovr: 81, pac: 77, sho: 74, pas: 79, def: 75, phy: 76 },
        { name: "S. Szymanski", role: "CAM", ovr: 80, pac: 82, sho: 78, pas: 79, def: 62, phy: 70 },
        { name: "Dusan Tadic", role: "LW", ovr: 82, pac: 65, sho: 80, pas: 85, def: 43, phy: 74 },
        { name: "İrfan Can Kahveci", role: "RW", ovr: 79, pac: 72, sho: 79, pas: 81, def: 60, phy: 71 },
        { name: "Edin Dzeko", role: "ST", ovr: 81, pac: 55, sho: 83, pas: 71, def: 30, phy: 75 }
    ],
    worldclass: [
        { name: "Thibaut Courtois", role: "GK", ovr: 90, pac: 46, sho: 10, pas: 74, def: 90, phy: 83 },
        { name: "Achraf Hakimi", role: "RB", ovr: 84, pac: 92, sho: 75, pas: 79, def: 76, phy: 78 },
        { name: "Virgil van Dijk", role: "CB", ovr: 89, pac: 78, sho: 60, pas: 71, def: 89, phy: 86 },
        { name: "Ruben Dias", role: "CB", ovr: 89, pac: 67, sho: 39, pas: 66, def: 89, phy: 87 },
        { name: "Theo Hernandez", role: "LB", ovr: 85, pac: 95, sho: 71, pas: 76, def: 78, phy: 84 },
        { name: "Rodri Hernandez", role: "CDM", ovr: 91, pac: 66, sho: 73, pas: 86, def: 87, phy: 85 },
        { name: "Kevin De Bruyne", role: "CM", ovr: 91, pac: 72, sho: 88, pas: 94, def: 65, phy: 78 },
        { name: "Jude Bellingham", role: "CAM", ovr: 90, pac: 80, sho: 82, pas: 83, def: 78, phy: 85 },
        { name: "Mohamed Salah", role: "RW", ovr: 89, pac: 89, sho: 87, pas: 82, def: 45, phy: 75 },
        { name: "Vinicius Jr.", role: "LW", ovr: 89, pac: 95, sho: 82, pas: 81, def: 29, phy: 68 },
        { name: "Erling Haaland", role: "ST", ovr: 91, pac: 89, sho: 92, pas: 66, def: 45, phy: 88 }
    ],
    allstar: [
        { name: "M. ter Stegen", role: "GK", ovr: 89, pac: 40, sho: 12, pas: 85, def: 89, phy: 80 },
        { name: "Dani Carvajal", role: "RB", ovr: 84, pac: 80, sho: 54, pas: 78, def: 82, phy: 80 },
        { name: "Antonio Rüdiger", role: "CB", ovr: 85, pac: 82, sho: 53, pas: 71, def: 84, phy: 86 },
        { name: "Marquinhos", role: "CB", ovr: 87, pac: 78, sho: 56, pas: 75, def: 86, phy: 80 },
        { name: "Alfonso Davies", role: "LB", ovr: 83, pac: 95, sho: 66, pas: 72, def: 74, phy: 77 },
        { name: "Federico Valverde", role: "CM", ovr: 88, pac: 88, sho: 82, pas: 84, def: 78, phy: 82 },
        { name: "Bernardo Silva", role: "CM", ovr: 88, pac: 69, sho: 78, pas: 86, def: 70, phy: 68 },
        { name: "Lionel Messi", role: "CAM", ovr: 90, pac: 75, sho: 87, pas: 90, def: 33, phy: 64 },
        { name: "Kylian Mbappe", role: "ST", ovr: 91, pac: 97, sho: 90, pas: 80, def: 36, phy: 78 },
        { name: "Harry Kane", role: "ST", ovr: 90, pac: 69, sho: 93, pas: 84, def: 49, phy: 83 },
        { name: "Cristiano Ronaldo", role: "ST", ovr: 86, pac: 77, sho: 88, pas: 75, def: 34, phy: 75 }
    ]
};

let matchInterval;
let gameTime = 0;
let timeStep = 0;
let homeScore = 0, awayScore = 0;
let homeMatrix = 80, awayMatrix = 80;
let players = [];
let ball = { x: 375, y: 240, targetX: 375, targetY: 240, speed: 0.13, holder: null };
let matchRunning = false;

function getShortName(name) {
    let p = name.split(" ");
    if(p.length > 1) {
        if(p[0].length <= 2) return p[0] + " " + p[1];
        return p[0][0] + ". " + p[p.length - 1];
    }
    return name;
}

function startEngine() {
    document.getElementById('setupPanel').classList.add('hidden');
    document.getElementById('matchPanel').classList.remove('hidden');
    
    homeScore = 0; awayScore = 0; gameTime = 0;
    matchRunning = true;

    let duration = parseInt(document.getElementById('matchDuration').value);
    // Maç süresi ölçekleme formülü (30 FPS döngüsüne göre oyun içi dakikayı büyütme)
    let totalFrames = duration * 60 * 30;
    timeStep = 90 / totalFrames;

    calculateTacticalMatrices();
    deployPlayers();
    resetBallCenter();

    matchInterval = setInterval(updatePhysicsLoop, 33);
}

function calculateTacticalMatrices() {
    // Sofifa özellik ağırlıklı gelişmiş taktik avantaj algoritmaları
    homeMatrix = 82; awayMatrix = 82;

    let hTac = document.getElementById('hTactic').value;
    let aTac = document.getElementById('aTactic').value;
    let hLine = document.getElementById('hLine').value;
    let aLine = document.getElementById('aLine').value;

    // Gegenpress vs Tiki-Taka çarpışması
    if (hTac === 'gegen' && aTac === 'tiki') homeMatrix += 4;
    if (aTac === 'gegen' && hTac === 'tiki') awayMatrix += 4;

    // Kontra Atak vs Önde Çizgi kuran takım avantajı (FM klasiği)
    if (hTac === 'counter' && aLine === 'high') homeMatrix += 6;
    if (aTac === 'counter' && hLine === 'high') awayMatrix += 6;

    // Otobüsü Çekme stratejisinin kontra atağı kilitlemesi
    if (hTac === 'bus' && aTac === 'counter') homeMatrix += 3;
    if (aTac === 'bus' && hTac === 'counter') awayMatrix += 3;

    if(document.getElementById('weather').value === 'rainy') {
        // Yağmurlu hava teknik takımları zorlaştırır
        if(hTac === 'tiki') homeMatrix -= 3;
        if(aTac === 'tiki') awayMatrix -= 3;
    }
}

function deployPlayers() {
    players = [];
    let hSquadKey = document.getElementById('hSquad').value;
    let aSquadKey = document.getElementById('aSquad').value;

    let hData = JSON.parse(JSON.stringify(sofifaDatabase[hSquadKey]));
    let aData = JSON.parse(JSON.stringify(sofifaDatabase[aSquadKey]));

    let hForm = document.getElementById('hForm').value;
    let aForm = document.getElementById('aForm').value;

    function build(team, formStr, roster) {
        let isHome = team === 'home';
        let color = isHome ? '#3498db' : '#e74c3c';
        let side = isHome ? 1 : -1;
        let line = document.getElementById(isHome ? 'hLine' : 'aLine').value;
        
        let rosterIdx = 0;

        // 1. Kaleci Yerleşimi
        let gkData = roster.find(p => p.role === "GK") || roster[rosterIdx++];
        players.push({
            name: getShortName(gkData.name), team: team, currentRole: "GK", data: gkData,
            baseX: isHome ? 35 : 715, baseY: 240, x: isHome ? 35 : 715, y: 240, color: isHome ? '#1abc9c':'#f39c12'
        });

        // Formasyon kırılımları
        let defCount = parseInt(formStr[0]);
        let midCount = parseInt(formStr[1]);
        let attCount = parseInt(formStr[2]);
        let amcCount = formStr.length === 4 ? parseInt(formStr[2]) : 0;
        if(formStr.length === 4) attCount = parseInt(formStr[3]);

        // 2. Defans Bloğu Kurulumu ve Mevki Uyum Kontrolü
        for(let i=0; i<defCount; i++) {
            let py = 480 * (i + 1) / (defCount + 1);
            let px = isHome ? 140 : 610;
            if(line === 'high') px += side * 45;
            if(line === 'low') px -= side * 35;

            let pData = roster.filter(p => p.role === "CB" || p.role === "LB" || p.role === "RB")[i] || roster[rosterIdx++];
            // MEVKİ CEZASI: Eğer defans oyuncusu gidip ST veri kartına sahipse gücü düşer
            let suitPenalty = (pData.role==='ST' || pData.role==='CAM') ? 0.65 : 1.0;

            players.push({
                name: getShortName(pData.name), team: team, currentRole: "DEF", data: pData, penalty: suitPenalty,
                baseX: px, baseY: py, x: px, y: py, color: color
            });
        }

        // 3. Merkez Orta Saha Kurulumu
        for(let i=0; i<midCount; i++) {
            let py = 480 * (i + 1) / (midCount + 1);
            let px = isHome ? 290 : 460;

            let pData = roster.filter(p => p.role === "CM" || p.role === "CDM")[i] || roster[rosterIdx++];
            let suitPenalty = (pData.role==='GK' || pData.role==='ST') ? 0.70 : 1.0;

            players.push({
                name: getShortName(pData.name), team: team, currentRole: "MID", data: pData, penalty: suitPenalty,
                baseX: px, baseY: py, x: px, y: py, color: color
            });
        }

        // 4. Ofansif / Forvet Grubu Kurulumu
        let totalAttackers = amcCount + attCount;
        for(let i=0; i<totalAttackers; i++) {
            let py = 480 * (i + 1) / (totalAttackers + 1);
            let px = isHome ? 460 : 290;
            if(i >= amcCount) px = isHome ? 560 : 190; // İleri uç hattı

            let pData = roster.filter(p => p.role === "ST" || p.role === "LW" || p.role === "RW" || p.role === "CAM")[i] || roster[rosterIdx++];
            let suitPenalty = (pData.role==='CB' || pData.role==='GK') ? 0.60 : 1.0;

            players.push({
                name: getShortName(pData.name), team: team, currentRole: "ATT", data: pData, penalty: suitPenalty,
                baseX: px, baseY: py, x: px, y: py, color: color
            });
        }
    }

    build('home', hForm, hData);
    build('away', aForm, aData);
}

function updatePhysicsLoop() {
    if (!matchRunning) return;
    
    gameTime += timeStep;
    if (gameTime >= 90) {
        gameTime = 90;
        matchRunning = false;
        clearInterval(matchInterval);
        reportEvent("DÜDÜK ÇALDI! Karşılaşma sona erdi.");
        drawField();
        return;
    }

    // Zaman Göstergesi Ayarı
    let mins = Math.floor(gameTime).toString().padStart(2, '0');
    let secs = Math.floor((gameTime % 1) * 60).toString().padStart(2, '0');
    document.getElementById('timeDisplay').innerText = `${mins}:${secs}`;
    document.getElementById('scoreDisplay').innerText = `${homeScore} - ${awayScore}`;

    // TOP POSSESSION VE PAS SİMÜLASYONU
    if (Math.random() < 0.06) {
        let homeWeight = homeMatrix + (Math.random() * 15);
        let awayWeight = awayMatrix + (Math.random() * 15);
        let currentAttackerTeam = homeWeight > awayWeight ? 'home' : 'away';

        let candidates = players.filter(p => p.team === currentAttackerTeam && p.currentRole !== 'GK');
        let holder = candidates[Math.floor(Math.random() * candidates.length)];
        
        if (holder) {
            // Sofifa Pas yeteneğine bağlı isabet çarpanı kontrolü
            let passCapability = holder.data.pas * (holder.penalty || 1);
            if(passCapability > 50 + (Math.random() * 35)) {
                // Başarılı pas organizasyonu
                ball.targetX = holder.baseX + (currentAttackerTeam === 'home' ? 55 : -55) + (Math.random()*40 - 20);
                ball.targetY = holder.baseY + (Math.random()*60 - 30);
                ball.holder = holder;
                
                if(Math.random() < 0.2) {
                    reportEvent(`${holder.name} akıllıca bir pas pas boşluğuna bıraktı.`);
                }
            } else {
                // Pas hatası veya top kapma
                let defTeam = currentAttackerTeam === 'home' ? 'away' : 'home';
                let interceptors = players.filter(p => p.team === defTeam && p.currentRole === 'DEF');
                let interceptor = interceptors[Math.floor(Math.random() * interceptors.length)];
                if(interceptor) {
                    ball.targetX = interceptor.baseX;
                    ball.targetY = interceptor.baseY;
                    ball.holder = interceptor;
                    reportEvent(`${interceptor.name} araya girerek topu takımına kazandırdı!`);
                }
            }
        }

        // ŞUT VE POZİSYON DEĞERLENDİRME DÖNGÜSÜ
        let shootChance = currentAttackerTeam === 'home' ? (ball.x > 500) : (ball.x < 250);
        if (shootChance && Math.random() < 0.35) {
            let activeAttacker = players.filter(p => p.team === currentAttackerTeam && p.currentRole === 'ATT')[0];
            if(activeAttacker) {
                let targetGK = players.find(p => p.team === (currentAttackerTeam === 'home' ? 'away' : 'home') && p.currentRole === 'GK');
                ball.targetX = currentAttackerTeam === 'home' ? 745 : 5;
                ball.targetY = 240 + (Math.random() * 60 - 30);
                
                // Sofifa Bitiricilik (SHO) vs Kaleci Kurtarış (DEF) Karşılaştırması
                let shotPower = activeAttacker.data.sho * (activeAttacker.penalty || 1) + (Math.random() * 20);
                let gkSaving = targetGK.data.def + (Math.random() * 25);

                if (shotPower > gkSaving) {
                    if(currentAttackerTeam === 'home') homeScore++; else awayScore++;
                    reportEvent(`TEHLİKELİ POZİSYON... Ve GOOOL! ${activeAttacker.name} harika bitirdi!`);
                    resetBallCenter();
                } else {
                    reportEvent(`${activeAttacker.name} sert vurdu ancak kaleci ${targetGK.name} başarılı!`);
                    ball.targetX = targetGK.x; ball.targetY = targetGK.y;
                }
            }
        }
    }

    // Topun Fiziksel Akışı
    ball.x += (ball.targetX - ball.x) * ball.speed;
    ball.y += (ball.targetY - ball.y) * ball.speed;

    // OYUNCULARIN FM TARZI MİKRO POZİSYON ALMALARI
    players.forEach(p => {
        let distanceToBall = Math.hypot(ball.x - p.baseX, ball.y - p.baseY);
        // Eğer top oyuncunun taktik etki alanındaysa topa doğru meyleder
        if (distanceToBall < 160) {
            let factor = (p.data.pac / 100) * 0.09; // Hız (PAC) parametresinin etkisi
            p.x += ((ball.x + p.baseX)/2 - p.x) * factor;
            p.y += ((ball.y + p.baseY)/2 - p.y) * factor;
        } else {
            // Top uzaksa kendi taktiksel pozisyon çizgisine geri döner
            p.x += (p.baseX - p.x) * 0.05;
            p.y += (p.baseY - p.y) * 0.05;
        }
    });

    drawField();
}

function resetBallCenter() {
    ball.x = 375; ball.y = 240; ball.targetX = 375; ball.targetY = 240; ball.holder = null;
}

function reportEvent(txt) {
    document.getElementById('liveReport').innerText = txt;
}

function drawField() {
    // 1. Sahayı Temizle ve Çimleri Boya
    ctx.fillStyle = '#143d1f';
    ctx.fillRect(0, 0, 750, 480);

    // 2. Saha Çizgileri Grafikleri
    ctx.strokeStyle = varColor('--pitch-line');
    ctx.lineWidth = 2;
    ctx.strokeRect(10, 10, 730, 460); // Sınırlar

    // Orta Saha Çizgisi ve Yuvarlağı
    ctx.beginPath();
    ctx.moveTo(375, 10); ctx.lineTo(375, 470);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(375, 240, 65, 0, 2 * Math.PI);
    ctx.stroke();

    // Ceza Sahaları
    ctx.strokeRect(10, 110, 80, 260); // Sol Ceza Sahası
    ctx.strokeRect(660, 110, 80, 260); // Sağ Ceza Sahası

    // Altıpas Alanları
    ctx.strokeRect(10, 180, 30, 120);
    ctx.strokeRect(710, 180, 30, 120);

    // Kale Direkleri Çizgisi
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(5, 210, 5, 60);
    ctx.fillRect(740, 210, 5, 60);

    // 3. Oyuncuları Çiz (2D Daire Yapısı)
    players.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 11, 0, 2 * Math.PI);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Eğer topa bu oyuncu sahipse etrafında parıltı çemberi oluşturur
        if(ball.holder === p && Math.hypot(ball.x - p.x, ball.y - p.y) < 20) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 16, 0, 2 * Math.PI);
            ctx.strokeStyle = varColor('--accent');
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Oyuncu İsimleri Grafiği (Altında Küçük ve Okunaklı Kısaltma)
        ctx.fillStyle = '#ffffff';
        ctx.font = "bold 9px 'Segoe UI', Arial";
        ctx.textAlign = "center";
        // Göz yormaması için metin arkasına hafif gölge efekti
        ctx.shadowColor = "black";
        ctx.shadowBlur = 4;
        ctx.fillText(p.name, p.x, p.y + 21);
        ctx.shadowBlur = 0; // Gölgeyi sıfırla
    });

    // 4. Top Grafiği
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function abortMatch() {
    matchRunning = false;
    clearInterval(matchInterval);
    document.getElementById('setupPanel').classList.remove('hidden');
    document.getElementById('matchPanel').classList.add('hidden');
}
</script>
